<!-- ─────────────────────────────────────────────────────────────
  3. architect.html
     When the user arrives from market.html via "Design on this Plot →"
     the selected plot is in sessionStorage under 'market_selected_plot'.
     Paste this block INSIDE your existing architect.js init function,
     or at the bottom of architect.html before </body>.
──────────────────────────────────────────────────────────────── -->
<script>
(function injectMarketPlot() {
  if (!window.location.search.includes('from=market')) return;
  const raw = sessionStorage.getItem('market_selected_plot');
  if (!raw) return;
  try {
    const plot = JSON.parse(raw);
    sessionStorage.removeItem('market_selected_plot');

    // Pre-fill site dimensions if your architect form has these fields
    const sqftInput = document.getElementById('site-sqft') || document.getElementById('plot-area');
    if (sqftInput && plot.sqft) sqftInput.value = plot.sqft;

    // Show a dismissible banner
    const banner = document.createElement('div');
    banner.style.cssText = `
      position:fixed; top:64px; left:50%; transform:translateX(-50%);
      background:#2d2d4a; border:1px solid rgba(232,201,126,0.4);
      color:#f0ede8; font-size:13px; padding:10px 20px;
      border-radius:8px; z-index:9999; display:flex; align-items:center; gap:12px;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
    `;
    banner.innerHTML = `
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e8c97e" stroke-width="2">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/>
      </svg>
      <span>Designing on <strong>${plot.name}</strong> — $${plot.price.toLocaleString()}</span>
      <button onclick="this.parentNode.remove()" style="background:none;border:none;color:#a0a0b8;cursor:pointer;font-size:16px;line-height:1;">×</button>
    `;
    document.body.appendChild(banner);
    setTimeout(() => banner.remove(), 8000);
  } catch (e) {
    console.warn('Could not parse market plot:', e);
  }
})();
</script>
